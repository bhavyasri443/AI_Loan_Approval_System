<!DOCTYPE html>

<html>
<head>
    <title>Admin Login</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#eef2f7;
    }

    .login-container{
        width:400px;
        background:white;
        padding:40px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.2);
        animation:fadeIn 1s ease;
    }

    h1{
        text-align:center;
        color:#3498db;
        margin-bottom:30px;
    }

    label{
        font-weight:bold;
        display:block;
        margin-top:15px;
    }

    input{
        width:100%;
        padding:12px;
        margin-top:8px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        margin-top:25px;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#3498db;
        color:white;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#2980b9;
        transform:scale(1.02);
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

</style>

</head>

<body>

<div class="login-container">

    <h1>Admin Login</h1>

    <form method="POST">

        <label>Username</label>
        <input
            type="text"
            name="username"
            required>

        <label>Password</label>
        <input
            type="password"
            name="password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
